; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ttgo-t1]
platform = espressif32
board = ttgo-t1
framework = arduino
monitor_speed = 115200
; Only compile main.cpp — mac.cpp and main_collector.cpp are excluded
build_src_filter = +<main.cpp>
; RTLola generated monitor — build rtlola-CES first with:
;   cd ../rtlola-CES/rtlola-platformio && pio run -e esp32dev-pachinko
; That generates lib/rtlola_pachinko/monitor.h and monitor.cpp
build_flags = -I"../rtlola-CES/rtlola-platformio/lib/rtlola_pachinko"
lib_extra_dirs = ../rtlola-CES/rtlola-platformio/lib